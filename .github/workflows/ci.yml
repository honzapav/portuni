name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  server:
    name: Server (lint, typecheck, test, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint:strict
      - run: npx tsc --noEmit
      - run: npm test
      - run: npm run build

  app:
    name: App (typecheck, build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci --prefix apps/web
      - run: npx --prefix apps/web tsc -b apps/web --noEmit
      - run: npm --prefix apps/web run build
